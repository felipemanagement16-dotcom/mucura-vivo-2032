
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Nunito:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--o1:#002d47;--o2:#004e6e;--t1:#0a7373;--t2:#0d9e8c;--t3:#5eead4;--s:#f0fafa;--w:#ffffff;--ink:#011e2e}
body{font-family:'Nunito',sans-serif;background:var(--o1)}
.wrap{padding:0 0 2rem}
.hero{position:relative;text-align:center;padding:2.4rem 1.5rem 3.2rem;background:linear-gradient(160deg,var(--o1) 0%,var(--o2) 100%);overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 60% at 10% 70%,rgba(6,182,212,.18) 0%,transparent 65%),radial-gradient(ellipse 45% 50% at 90% 30%,rgba(10,115,115,.15) 0%,transparent 65%),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.03) 40px)}
.hero-wave{position:absolute;bottom:-1px;left:0;right:0;line-height:0}
.hero-wave svg{display:block;width:100%}
.htag{position:relative;display:inline-block;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t3);border:1px solid rgba(94,234,212,.4);padding:4px 16px;border-radius:20px;margin-bottom:16px}
.h1{position:relative;font-family:'Playfair Display',serif;font-size:clamp(38px,5.5vw,68px);font-weight:800;color:var(--w);line-height:1;letter-spacing:-1px;margin-bottom:8px}
.h1 span{color:var(--t3);font-style:italic}
.hsub{position:relative;font-family:'Nunito',sans-serif;font-size:15px;font-weight:400;color:rgba(240,250,250,.6)}
.hbar{width:48px;height:3px;background:var(--t3);border-radius:2px;margin:16px auto 8px}
.hint{position:relative;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:rgba(94,234,212,.85)}
.nav{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;padding:1.4rem 1.5rem 1rem;background:var(--o2)}
.nbtn{font-family:'Nunito',sans-serif;padding:8px 16px;font-size:13px;font-weight:600;border:1.5px solid rgba(94,234,212,.25);border-radius:20px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.05);color:rgba(240,250,250,.65)}
.nbtn:hover{background:rgba(6,182,212,.15);color:var(--w);border-color:var(--t2)}
.nbtn.on{color:var(--ink);border-color:transparent;font-weight:700}
.cgrid{display:grid;grid-template-columns:1fr 1fr 2fr 1fr 1fr;grid-template-rows:auto auto auto;gap:8px;padding:0 1.5rem}
.b-cadena   {grid-column:1;grid-row:1/3}
.b-activ    {grid-column:2;grid-row:1}
.b-problema {grid-column:3;grid-row:1}
.b-relac    {grid-column:4;grid-row:1}
.b-seg      {grid-column:5;grid-row:1/3}
.b-recursos {grid-column:2;grid-row:2}
.b-proposito{grid-column:3;grid-row:2}
.b-canales  {grid-column:4;grid-row:2}
.b-costos   {grid-column:1/3;grid-row:3}
.b-metricas {grid-column:3;grid-row:3}
.b-ingresos {grid-column:4/6;grid-row:3}
.bcard{cursor:pointer;transition:transform .2s;height:100%;min-height:110px}
.bcard:hover{transform:translateY(-4px)}
.bi{height:100%;border-radius:12px;border:2px solid rgba(255,255,255,.1);padding:16px 15px}
.bico{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px}
.bttl{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--w);line-height:1.25;margin-bottom:8px}
.bprev{font-family:'Lora',serif;font-size:13px;font-weight:400;color:rgba(255,255,255,.83);line-height:1.6}
.b-proposito .bi{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px 20px}
.heart-svg{width:68px;height:60px;margin:6px 0 10px;flex-shrink:0}
.prop-ttl{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--w);margin-bottom:8px}
.prop-quote{font-family:'Lora',serif;font-size:13px;font-style:italic;color:rgba(255,255,255,.87);line-height:1.6}
.dpanel{margin:10px 1.5rem 0;border-radius:14px;overflow:hidden;border:2px solid rgba(6,182,212,.3)}
.dh{padding:22px 26px 18px;display:flex;align-items:center;gap:16px}
.dh-ico{width:52px;height:52px;border-radius:13px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.dh-lbl{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.65)}
.db{background:var(--s);padding:22px 26px 26px}
.dquote{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;font-weight:700;line-height:1.65;color:var(--o2);padding:16px 22px;border-left:4px solid var(--t1);border-radius:0 10px 10px 0;background:rgba(10,115,115,.1);margin-bottom:20px}
.dgrid{display:grid;gap:14px}
.dgrid.g2{grid-template-columns:1fr 1fr}
.dgrid.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.ditem{display:flex;gap:11px;align-items:flex-start}
.ddot{width:7px;height:7px;border-radius:50%;margin-top:10px;flex-shrink:0}
.dtxt{font-family:'Lora',serif;font-size:15px;font-weight:400;color:#0d3545;line-height:1.7}
.dtxt strong{font-family:'Lora',serif;font-weight:600;color:var(--ink)}
.dglbl{font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding-bottom:8px;border-bottom:2px solid;margin-bottom:12px}
.dbig{font-family:'Playfair Display',serif;font-size:44px;font-weight:700;line-height:1;margin-bottom:5px}
</style>

 quote:'El turismo deja plata en la comunidad, la comunidad cuida el arrecife, y el arrecife mantiene vivo al turismo.',

let active=null;
function dot(c){return `<div class="ddot" style="background:${c}"></div>`}
function itm(i,c){return `<div class="ditem">${dot(c)}<div class="dtxt"><strong>${i.t}:</strong> ${i.d}</div></div>`}

function buildPanel(d){
  const c=d.bg;let body='';
  if(d.lay==='propuesta'){
    body=`<div class="dquote">"${d.quote}"</div><div class="dgrid g2">${d.items.map(i=>itm(i,c)).join('')}</div>`;
  } else if(d.lay==='problema'){
    body=`<div style="background:rgba(10,115,115,.1);border-left:4px solid ${c};border-radius:0 10px 10px 0;padding:14px 20px;margin-bottom:20px;font-family:'Lora',serif;font-size:16px;font-weight:500;color:var(--ink);line-height:1.7">${d.problema}</div>
    <div class="dgrid g2">${d.items.map(i=>itm(i,c)).join('')}</div>`;
  } else if(d.lay==='costos'){
    body=`<div class="dgrid g3">${d.grupos.map(g=>`<div>
      <div class="dglbl" style="color:${c};border-color:${c}50">${g.tit}</div>
      ${g.items.map(i=>`<div class="ditem">${dot(c)}<div class="dtxt">${i}</div></div>`).join('')}
    </div>`).join('')}</div>`;
  } else if(d.lay==='metricas'){
    body=`<table style="width:100%;border-collapse:collapse">
      <thead><tr>
        <th style="text-align:left;padding:9px 11px;background:${c}25;color:${c};font-weight:700;font-family:'Nunito',sans-serif;font-size:13px">Indicador</th>
        <th style="padding:9px 11px;background:${c}25;color:${c};font-weight:700;text-align:center;font-family:'Nunito',sans-serif;font-size:13px">Hoy</th>
        <th style="padding:9px 11px;background:${c}35;color:${c};font-weight:700;text-align:center;font-family:'Nunito',sans-serif;font-size:13px">Meta 2028</th>
        <th style="padding:9px 11px;background:${c}45;color:${c};font-weight:700;text-align:center;font-family:'Nunito',sans-serif;font-size:13px">Meta 2032</th>
      </tr></thead>
      <tbody>${d.items.map((r,i)=>`<tr style="background:${i%2===0?'white':'rgba(14,116,144,.05)'}">
        <td style="padding:9px 11px;font-family:'Lora',serif;font-size:14px;font-weight:500;color:var(--ink)">${r.ind}</td>
        <td style="padding:9px 11px;text-align:center;font-family:'Lora',serif;font-size:14px;color:#555">${r.hoy}</td>
        <td style="padding:9px 11px;text-align:center;font-family:'Lora',serif;font-size:14px;color:${c};font-weight:600">${r.m28}</td>
        <td style="padding:9px 11px;text-align:center;font-family:'Lora',serif;font-size:14px;color:${c};font-weight:600">${r.m32}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  } else if(d.lay==='ingresos'){
    body=`<div class="dgrid g2">
      <div>
        <div class="dglbl" style="color:${c};border-color:${c}50">Ingreso principal</div>
        <div class="dbig" style="color:${c}">$60 millones</div>
        <div class="dtxt" style="margin-bottom:8px">COP por año</div>
        <div class="dtxt">Tasa ecológica: $15.000 × 4.000 turistas. Cubre la operación completa desde el año 2.</div>
      </div>
      <div>
        <div class="dglbl" style="color:${c};border-color:${c}50">Ingresos complementarios</div>
        ${d.items.map(i=>itm(i,c)).join('')}
        <div class="ditem" style="margin-top:10px">${dot(c)}<div class="dtxt"><strong>Total propio: ~$78 millones COP/año.</strong> Cubre la operación completa desde el año 2 sin depender de nadie.</div></div>
      </div>
    </div>`;
  } else {
    body=`<div class="dgrid">${d.items.map(i=>itm(i,c)).join('')}</div>`;
  }
  return `<div class="dh" style="background:${c}">
    <div class="dh-ico">${d.ico}</div>
    <div><div class="dh-lbl">${d.lbl}</div></div>
  </div><div class="db">${body}</div>`;
}

function toggle(id){
  const panel=document.getElementById('panel');
  if(active===id){active=null;panel.style.display='none';document.querySelectorAll('.nbtn').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';});return;}
  active=id;
  const d=BLOCKS.find(x=>x.id===id);
  document.querySelectorAll('.nbtn').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';});
  const nb=document.getElementById('nb-'+id);
  nb.classList.add('on');nb.style.background=d.bg;nb.style.color='#fff';
  panel.style.borderColor=d.bg;
  panel.innerHTML=buildPanel(d);
  panel.style.display='block';
  setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}

function init(){
  const grid=document.getElementById('grid');

  BLOCKS.forEach(d=>{

    if(d.id==='proposito'){
      cell.innerHTML=`<div class="bcard" onclick="toggle('proposito')">
        <div class="bi" style="background:${d.bg}">
          <svg class="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
            <path d="M50,80 C50,80 10,52 10,28 C10,14 20,6 30,6 C38,6 44,10 50,18 C56,10 62,6 70,6 C80,6 90,14 90,28 C90,52 50,80 50,80 Z" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="3.5"/>
            <circle cx="50" cy="62" r="9" fill="rgba(255,255,255,0.9)"/>
          </svg>
          <div class="prop-ttl">Propósito</div>
          <div class="prop-quote">"El turismo deja plata en la comunidad, la comunidad cuida el arrecife, y el arrecife mantiene vivo al turismo."</div>
        </div>
      </div>`;
    } else {
      cell.innerHTML=`<div class="bcard" onclick="toggle('${d.id}')">
        <div class="bi" style="background:${d.bg}">
          <div class="bico">${d.ico}</div>
          <div class="bttl">${d.lbl}</div>
          <div class="bprev">${d.prev}</div>
        </div>
      </div>`;
    }
    grid.appendChild(cell);
    const btn=document.createElement('button');
    btn.className='nbtn';btn.id='nb-'+d.id;
    btn.textContent=d.lbl;
    btn.style.borderColor=d.bg+'90';
    btn.onclick=()=>toggle(d.id);
    nav.appendChild(btn);
  });
}
init();
</script>
